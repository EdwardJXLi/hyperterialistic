name: Android CI

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  debug:
    name: Test, Lint, And Build Debug APK
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36.1" "build-tools;36.1.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and verify debug APK
        run: ./gradlew --no-daemon :app:testDebugUnitTest :app:lintDebug :app:assembleDebug

      - name: Stage debug APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/hyperterialistic-debug-latest.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: hyperterialistic-debug-apk
          path: dist/hyperterialistic-debug-latest.apk
          if-no-files-found: error

  release:
    name: Build Signed Release APK
    runs-on: ubuntu-24.04
    needs: debug
    if: github.event_name != 'pull_request'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36.1" "build-tools;36.1.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        env:
          HYPERTERIALISTIC_KEYSTORE_BASE64: ${{ secrets.HYPERTERIALISTIC_KEYSTORE_BASE64 }}
        run: |
          test -n "$HYPERTERIALISTIC_KEYSTORE_BASE64"
          printf '%s' "$HYPERTERIALISTIC_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/hyperterialistic-release.jks"

      - name: Build signed release APK
        env:
          HYPERTERIALISTIC_KEYSTORE_FILE: ${{ runner.temp }}/hyperterialistic-release.jks
          HYPERTERIALISTIC_KEYSTORE_PASSWORD: ${{ secrets.HYPERTERIALISTIC_KEYSTORE_PASSWORD }}
          HYPERTERIALISTIC_KEY_ALIAS: ${{ secrets.HYPERTERIALISTIC_KEY_ALIAS }}
          HYPERTERIALISTIC_KEY_PASSWORD: ${{ secrets.HYPERTERIALISTIC_KEY_PASSWORD }}
        run: |
          test -n "$HYPERTERIALISTIC_KEYSTORE_PASSWORD"
          test -n "$HYPERTERIALISTIC_KEY_ALIAS"
          test -n "$HYPERTERIALISTIC_KEY_PASSWORD"
          ./gradlew --no-daemon :app:assembleRelease

      - name: Verify signed release APK
        run: |
          "$ANDROID_HOME/build-tools/36.1.0/apksigner" verify --verbose app/build/outputs/apk/release/app-release.apk

      - name: Stage release APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk dist/hyperterialistic-release-latest.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: hyperterialistic-release-apk
          path: dist/hyperterialistic-release-latest.apk
          if-no-files-found: error

  publish-latest:
    name: Publish Latest APK Release
    runs-on: ubuntu-24.04
    needs: [debug, release]
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
    concurrency:
      group: latest-apk-release
      cancel-in-progress: false

    steps:
      - name: Download debug APK
        uses: actions/download-artifact@v4
        with:
          name: hyperterialistic-debug-apk
          path: dist

      - name: Download release APK
        uses: actions/download-artifact@v4
        with:
          name: hyperterialistic-release-apk
          path: dist

      - name: Publish latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --repo "$GITHUB_REPOSITORY" --cleanup-tag --yes || true
          gh api --method DELETE "repos/$GITHUB_REPOSITORY/git/refs/tags/latest" || true
          gh release create latest dist/*.apk \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Latest Build" \
            --notes "Installable debug and signed release APKs for $GITHUB_SHA." \
            --latest

  publish-apk-repository:
    name: Publish to APK Repository
    runs-on: ubuntu-24.04
    needs: release
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
    concurrency:
      group: apk-repository-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          name: hyperterialistic-release-apk
          path: dist

      - name: Upload release APK to APK Repository
        env:
          APK_REPOSITORY_URL: ${{ secrets.APK_REPOSITORY_URL }}
          APK_REPOSITORY_API_KEY: ${{ secrets.APK_REPOSITORY_API_KEY }}
        run: |
          if [ -z "$APK_REPOSITORY_URL" ]; then
            echo "::error::Missing APK_REPOSITORY_URL repository secret."
            exit 1
          fi
          if [ -z "$APK_REPOSITORY_API_KEY" ]; then
            echo "::error::Missing APK_REPOSITORY_API_KEY repository secret."
            exit 1
          fi
          apk="$(find dist -name '*release*.apk' -print -quit)"
          if [ -z "$apk" ]; then
            echo "::error::No release APK found in downloaded artifacts."
            exit 1
          fi
          base_url="${APK_REPOSITORY_URL%/}"
          curl --fail-with-body \
            -H "Authorization: Bearer ${APK_REPOSITORY_API_KEY}" \
            -F "apk=@${apk};type=application/vnd.android.package-archive" \
            -F 'metadata={"release_channel":"release"}' \
            "${base_url}/api/v1/upload"
